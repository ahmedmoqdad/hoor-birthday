<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميلاد حور السعيد 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff4757; --glass: rgba(255, 255, 255, 0.9); }
        body { 
            margin: 0; font-family: 'Reem Kufi', sans-serif; 
            background: #fff0f3; /* لون خلفية مختلف للتأكد من التحديث */
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container {
            width: 85%; max-width: 450px; background: var(--glass);
            border-radius: 25px; padding: 30px; 
            box-shadow: 0 15px 35px rgba(255, 71, 87, 0.1);
            text-align: center; border: 2px solid #ffccd5;
        }
        .img-area { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .img-area img { 
            width: 130px; height: 130px; border-radius: 50%; 
            object-fit: cover; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { color: var(--accent); font-size: 2.2rem; margin: 10px 0; }
        .music-box { background: #fff; padding: 10px; border-radius: 15px; margin-top: 20px; }
        audio { width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="img-area">
            <img src="1.jpg" alt="1">
            <img src="2.jpg" alt="2">
        </div>
        <h1>حور ✨</h1>
        <p>كل عام وأنتِ بقلب أبيض وروح جميلة..❤️</p>
        <div class="music-box">
            <audio controls loop><source src="birthday.mp3" type="audio/mpeg"></audio>
        </div>
        <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.5;">Update v2.0 | Ahmed Miqdad</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>window.onload = function() { confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); };</script>
</body>
</html>
