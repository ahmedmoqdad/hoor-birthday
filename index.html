<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميلاد حور السعيد 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff4757; --glass: rgba(255, 255, 255, 0.95); }
        body { 
            margin: 0; font-family: 'Reem Kufi', sans-serif; 
            background: #fff0f3; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* فقاعات متحركة ناعمة */
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 71, 87, 0.1); border-radius: 50%; animation: rise 10s infinite ease-in; z-index: -1; }

        .container {
            width: 85%; max-width: 400px; background: var(--glass);
            border-radius: 30px; padding: 40px 25px; 
            box-shadow: 0 20px 40px rgba(255, 71, 87, 0.15);
            text-align: center; border: 1px solid #ffccd5;
            position: relative; z-index: 10; animation: fadeIn 1.5s ease-in;
        }

        .img-area { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .img-area img { 
            width: 120px; height: 120px; border-radius: 50%; 
            object-fit: cover; border: 4px solid white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: 0.5s;
        }
        .img-area img:hover { transform: scale(1.1) rotate(3deg); }

        h1 { 
            color: var(--accent); font-size: 2.8rem; margin: 5px 0;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.2);
        }

        .btn-surprise {
            background: var(--accent); color: white; border: none;
            padding: 12px 30px; border-radius: 50px; cursor: pointer;
            margin-top: 20px; font-family: 'Reem Kufi'; font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3); transition: 0.3s;
        }
        .btn-surprise:hover { transform: scale(1.05); background: #ff6b81; }

        #surpriseText { 
            display: none; margin-top: 20px; font-weight: bold; 
            color: #444; font-size: 1rem; line-height: 1.7;
            background: #fff5f6; padding: 15px; border-radius: 15px;
            border-right: 4px solid var(--accent);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-1000px) scale(1.5); opacity: 0; }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bubble" style="left: 10%; width: 50px; height: 50px; animation-delay: 0s;"></div>
    <div class="bubble" style="left: 35%; width: 70px; height: 70px; animation-delay: 3s;"></div>
    <div class="bubble" style="left: 80%; width: 40px; height: 40px; animation-delay: 6s;"></div>

    <div class="container">
        <div class="img-area">
            <img src="1.jpg" alt="1">
            <img src="2.jpg" alt="2">
        </div>
        <h1>حور ✨</h1>
        <p style="color: #666;">اليوم نحتفل بأجمل أيام السنة..</p>
        
        <button class="btn-surprise" onclick="showSurprise()">اضغطي هنا حور 🎁</button>
        
        <div id="surpriseText">
            إلى حور.. الإنسانة التي تجعل العالم مكاناً ألطف بوجودها. في يوم ميلادك، أتمنى لكِ سنة تشبه نقاء قلبك وجمال روحك. كل عام وأنتِ الجزء الأجمل في كل يوم، وكل عام وضحكتكِ تملأ الدنيا فرحاً. ميلاد سعيد! 🎂🎈
        </div>

        <div style="margin-top: 30px; background: white; padding: 10px; border-radius: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02);">
            <audio id="audio" controls loop style="width: 100%; height: 35px;">
                <source src="birthday.mp3" type="audio/mpeg">
            </audio>
        </div>
        
        <p style="font-size: 0.7rem; margin-top: 25px; opacity: 0.4;">Premium Edition v3.0 | Ahmed Miqdad</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function showSurprise() {
            const text = document.getElementById('surpriseText');
            text.style.display = 'block';
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.7 },
                colors: ['#ff4757', '#ffffff', '#ffccd5']
            });
        }
        window.onload = function() {
            // تأثير خفيف عند الفتح
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.3 } });
        };
    </script>
</body>
</html>
