<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميلاد حور السعيد 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff758c; --text: #2d3436; --glass: rgba(255, 255, 255, 0.85); }
        
        body { 
            margin: 0; font-family: 'Reem Kufi', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .container {
            width: 90%; max-width: 500px; background: var(--glass);
            backdrop-filter: blur(10px); border-radius: 30px;
            padding: 40px 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center; border: 1px solid rgba(255,255,255,0.3);
            animation: fadeIn 1.5s ease-out;
        }

        .profile-area { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        
        .img-wrapper {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden; transition: 0.5s;
        }
        .img-wrapper:hover { transform: scale(1.1) rotate(5deg); }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: var(--accent); font-size: 2.5rem; margin: 10px 0; }
        p { color: var(--text); font-size: 1.1rem; line-height: 1.6; }

        .music-card {
            background: white; border-radius: 20px; padding: 15px;
            margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        audio { width: 100%; height: 35px; }

        .footer-note { margin-top: 30px; font-size: 0.8rem; opacity: 0.6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-area">
            <div class="img-wrapper"><img src="1.jpg" alt="حور"></div>
            <div class="img-wrapper"><img src="2.jpg" alt="حور"></div>
        </div>

        <h1>حور ✨</h1>
        <p>كل عام وأنتِ بقلب أبيض وروح جميلة..<br>كل عام وأنتِ حور ❤️</p>

        <div class="music-card">
            <p style="margin-bottom: 10px; font-size: 0.9rem;">🎵 استمعي للحن ميلادك</p>
            <audio controls loop>
                <source src="birthday.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="footer-note">صنع بكل حب | أحمد مقداد 🦅</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        window.onload = function() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff758c', '#ff7eb3'] });
        };
    </script>
</body>
</html>
